<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
  height: 100%;
  overflow-x: hidden;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* 📞 ВОЗВРАЩЕНО */
.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

.container {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* PRODUCTS */
.products {
  flex: 1;
  min-width: 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
  box-sizing: border-box;
  padding-right: 0;
}

@media (max-width: 1450px) {

  .products {
    padding: 15px;
  }

  .cart {
    position: relative;
    top: auto;
    right: auto;
    width: calc(100% - 24px);
    margin: 10px 12px 24px 12px;
    max-height: none;
  }
}

/* 📦 FIX ВЕРСТКИ ТОВАРОВ */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  box-sizing: border-box;
  overflow-wrap: break-word;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* ===== CART ===== */
.cart {
  flex: 0 0 340px;

  position: sticky;
  top: 100px;

  max-height: none; 
  overflow-y: visible;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
  
/* TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* ✍️ ЕДИНЫЙ СТИЛЬ ПОЛЕЙ */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;

  font-family: Arial;
  font-size: 14px;
  color: #333;

  box-sizing: border-box;
}

/* ORDER */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
  transition: 0.2s;
}

/* 📌 FLOAT BUTTON */
.open-cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #2f4f3f;
  color: white;
  padding: 12px 14px;
  border-radius: 50px;

  border: none;
  cursor: pointer;
  z-index: 999;
  display: none;
}

/* MOBILE */
@media (max-width: 900px) {
  .cart {
    position: relative;
    width: 100%;
    box-sizing: border-box;
    margin: 10px auto 10px auto; /* одинаково сверху/снизу */
    max-height: none;
  }

  .products {
  padding: 10px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  }

  .container {
    flex-direction: column;
    gap: 10px;
  }

  .modal {
    padding: 5px;
  }

  .modal img {
    max-width: 95%;
    max-height: 80vh;
  }
}

/* ===== MODAL ZOOM ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;

  gap: 5px;
  padding: 5px;
  box-sizing: border-box;

  overflow: hidden;
}

.modal img {
  max-width: calc(100vw - 110px);
  max-height: 85vh;
  border-radius: 10px;
}

.modal button {
  min-width: 44px;
  min-height: 44px;

  background: rgba(255,255,255,0.15);
  color: white;

  border: none;
  border-radius: 10px;

  font-size: 20px;
  font-weight: 900;
}

.controls {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  height: 44px;
}

.controls button {
  flex: 1;
  background: #e0e0e0;
  color: #555;
  border: 1px solid #ccc;
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 900;
  font-size: 16px;
}

.order-btn:hover {
  transform: scale(1.03);
}

.controls button {
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 20px;
  font-weight: 900;

  padding: 0;
  line-height: 1;
}

.modal button {
  min-width: 44px;
  min-height: 44px;

  background: rgba(255,255,255,0.15);
  color: white;

  border: none;
  border-radius: 10px;

  font-size: 20px;
  font-weight: 900;
}

.container {
  gap: 10px;
  align-items: flex-start;
}

.products {
  padding-bottom: 10px;
}

.product {
  overflow: hidden;
min-width: 0;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;

  width: 44px;
  height: 44px;

  border: none;
  border-radius: 50%;
  background: white;

  font-size: 20px;
  font-weight: bold;

  z-index: 100;
}
  .add-btn {
  background: #2f4f3f;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
  font-weight: 600;

.add-btn:hover {

  .product b {

}
.product img {
  max-width: 100%;

}

  .modal img {

}
  .modal-arrow {
  min-width: 48px;
  min-height: 48px;

  background: rgba(255,255,255,0.2);
  color: white;

  border: none;
  border-radius: 10px;

  font-size: 22px;
  font-weight: 900;

  display: flex;
  align-items: center;
  justify-content: center;

  -webkit-text-stroke: 0.8px white;
}

.modal-close {
  font-weight: 900;
}
  .product img {
  will-change: transform, opacity;
  backface-visibility: hidden;
}

.products {
  contain: layout paint;
}

</style>
</head>

let cart = [];
let modalOpened = false;
let imgIndex = {};

/* RENDER */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <!-- 📸 ВЕРНУЛ ПЕРЕКЛЮЧЕНИЕ -->
        <img 
  src="${p.images[0]}" 
  id="img-${i}"
  loading="lazy"
  decoding="async"
  onclick="add(${i}, this)"
>

${p.images.length > 1 ? `
<div class="controls">
  <button onclick="prevImg(${i})">&#x2190;</button>
  <button onclick="nextImg(${i})">&#x2192;</button>
</div>
` : ""}

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button class="add-btn" onclick="add(${i}, this)">Додати до кошика</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

  function setImage(imgEl, src){
  const temp = new Image();
  temp.src = src;

  temp.onload = () => {
    requestAnimationFrame(() => {
      imgEl.style.opacity = "0.3";
      imgEl.src = src;
      imgEl.style.opacity = "1";
    });
  };
}
  
function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;

  const img = document.getElementById(`img-${i}`);
  setImage(img, p.images[getIndex(i)]);
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;

  const img = document.getElementById(`img-${i}`);
  setImage(img, p.images[getIndex(i)]);
}

/* CART */
function add(i, btn){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();

  if(btn){
    btn.innerText = "✔ Додано";
    btn.disabled = true;

    setTimeout(() => {
      btn.innerText = "Додати до кошика";
      btn.disabled = false;
    }, 1000);
  }
}

function changeQty(i, delta){
  cart[i].qty += delta;

  if(cart[i].qty <= 0){
    cart.splice(i, 1);
  }

  save();
  renderCart();
}

function renderCart(){

  if (!cart || cart.length === 0) {
    document.getElementById("cart").innerHTML = "";
    document.getElementById("total").innerText = "Итого: 0 грн";
    return;
  }
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price * c.qty;

    html += `
      <div class="cart-item">
        <div style="margin-bottom:5px;">
          ${c.name}
        </div>

        <div style="display:flex; align-items:center; gap:8px;">
          <button onclick="changeQty(${i}, -1)">-</button>
          <b>${c.qty}</b>
          <button onclick="changeQty(${i}, 1)">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerHTML = `Итого: <b>${total}</b> грн`;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* SCROLL */
function scrollToCart(){
  document.getElementById("cartBox").scrollIntoView({behavior:"smooth"});
}

    order += `${c.name} x ${c.qty}\n`;
  });

${order}

Ім'я: ${document.getElementById("name").value}

Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`);

 fetch("https://formspree.io/f/xrevoywb", {
  method: "POST",
  body: formData,
  mode: "no-cors"
});

alert("Ваше замовлення прийнято!");

renderCart();

/* BUTTON LOGIC */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    document.getElementById("cartBtn").style.display =
      e.isIntersecting ? "none" : "block";
  });
});

observer.observe(document.getElementById("cartBox"));

/* HEADER OFFSET */
window.addEventListener("load", () => {
  const h = document.getElementById("header").offsetHeight;
  document.getElementById("cartBox").style.top = (h + 10) + "px";
});

let startX = 0;

/* SWIPE START */
function startSwipe(e){
  startX = e.clientX || e.touches?.[0].clientX;
}

/* SWIPE END */
function endSwipe(e, i){
  let endX = e.clientX || e.changedTouches?.[0].clientX;
  if(!startX || !endX) return;

  let diff = startX - endX;

  if(Math.abs(diff) < 40) return;

  if(diff > 0){
    nextImg(i);
  } else {
    prevImg(i);
  }
}


/* CLOSE */
function closeModal(){
  document.getElementById("imgModal").style.display = "none";
  modalOpened = false;

  const arrows = document.querySelectorAll(".modal-arrow");
  arrows.forEach(a => a.style.display = "flex");

  history.replaceState(null, "", location.pathname);
}

function openImg(i){
  const p = products[i];
  const idx = getIndex(i);

  const modalImg = document.getElementById("modalImg");
  const newSrc = p.images[idx];
  const next = (idx + 1) % p.images.length;
const prev = (idx - 1 + p.images.length) % p.images.length;

[p.images[next], p.images[prev]].forEach(src => {
  const img = new Image();
  img.src = src;
});

  modalImg.style.opacity = "0.3";

  const temp = new Image();
  temp.src = newSrc;
  temp.onload = () => {
    setImage(modalImg, newSrc);
    modalImg.style.opacity = "1";
  };

  document.getElementById("imgModal").style.display = "flex";
  const arrows = document.querySelectorAll(".modal-arrow");

if (products[i].images.length <= 1) {
  arrows.forEach(a => a.style.display = "none");
} else {
  arrows.forEach(a => a.style.display = "flex");
}
  document.getElementById("imgModal").dataset.index = i;

  modalOpened = true;

  // 👉 ВАЖНО: добавляем "фиктивную страницу" в историю
  history.pushState({ modal: true }, "", "#img");
}

function nextModalImg(){
  const i = document.getElementById("imgModal").dataset.index;

  nextImg(i);
const modalImg = document.getElementById("modalImg");
const newSrc = products[i].images[getIndex(i)];

modalImg.style.opacity = "0.3";

const temp = new Image();
temp.src = newSrc;
temp.onload = () => {
  setImage(modalImg, newSrc);
  modalImg.style.opacity = "1";
};
}

function prevModalImg(){
  const i = document.getElementById("imgModal").dataset.index;

  prevImg(i);
  const modalImg = document.getElementById("modalImg");
const newSrc = products[i].images[getIndex(i)];

modalImg.style.opacity = "0.3";

const temp = new Image();
temp.src = newSrc;
temp.onload = () => {
  setImage(modalImg, newSrc);
  modalImg.style.opacity = "1";
};
}

  window.addEventListener("load", () => {
  const saved = JSON.parse(localStorage.getItem("cart"));
  if (saved && saved.length) {
    cart = saved;
    renderCart();
  }
});
  
window.addEventListener("popstate", function () {
  if (modalOpened) {
    closeModal();
    modalOpened = false;

    window.scrollTo({ top: 0, behavior: "smooth" });

    // чистим hash чтобы не застревал
    history.replaceState(null, "", location.pathname);
  }
});
</script>

<!-- MODAL ZOOM -->
<div class="modal" id="imgModal">

<button class="modal-close" onclick="closeModal()">✖</button>

<button class="modal-arrow" onclick="prevModalImg()">&#x2190;</button>

<img id="modalImg">

<button class="modal-arrow" onclick="nextModalImg()">&#x2192;</button>

</div>

</div>
</body>
</html>
