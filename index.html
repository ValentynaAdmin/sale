<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* ===== PRODUCTS (芯褋褌邪胁谢褟械屑 屑械褋褌芯 锌芯写 泻芯褉蟹懈薪褍) ===== */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
  padding: 15px;

  /* 馃憞 袙袗袞袧袨: 屑械褋褌芯 锌芯写 泻芯褉蟹懈薪褍 */
  padding-right: 380px;
}

/* PRODUCT */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  box-sizing: border-box;
  overflow: hidden;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

.product h4,
.product p {
  word-break: break-word;
}

/* BUTTON */
button {
  background: #2f4f3f;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== CART (fixed, 薪芯 袧袝 锌械褉械泻褉褘胁邪械褌 褌芯胁邪褉褘) ===== */
.cart {
  position: fixed;
  top: 80px;
  right: 10px;

  width: 340px;
  max-height: calc(100vh - 90px);
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* CART TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* ORDER BUTTON */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
}

/* MOBILE */
@media (max-width: 900px) {
  .products {
    padding-right: 15px; /* 馃憟 褍斜懈褉邪械屑 屑械褋褌芯 锌芯写 泻芯褉蟹懈薪褍 */
  }

  .cart {
    position: relative;
    width: calc(100% - 20px);
    margin: 10px auto;
  }
}
</style>
</head>

  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {
    html += `
      <div class="product">
        <img src="${p.images[0]}">
        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} 谐褉薪</b>

        <button onclick="add(${i})">袛芯写邪褌懈 写芯 泻芯褕懈泻邪</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;
    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ORDER */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
袧芯胁械 蟹邪屑芯胁谢械薪薪褟:

${order}

袉屑'褟: ${document.getElementById("name").value}
孝械谢械褎芯薪: ${document.getElementById("phone").value}
袗写褉械褋邪: ${document.getElementById("city").value}
袣芯屑械薪褌邪褉: ${document.getElementById("comment").value}

小褍屑邪: ${document.getElementById("total").innerText}
`
    })
  });

  alert("袟邪屑芯胁谢械薪薪褟 胁褨写锌褉邪胁谢械薪芯!");
  cart = [];
  save();
  renderCart();
}

</script>
