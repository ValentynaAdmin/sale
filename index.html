<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">

<!-- 📱 ОБЯЗАТЕЛЬНО для адаптации -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

/* LAYOUT */
.container {
  display: flex;
}

/* PRODUCTS */
.products {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  border-radius: 8px;
  cursor: zoom-in;
}

/* BUTTONS */
button {
  background: #2f4f3f;
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
  margin-top: 5px;
  border-radius: 6px;
  cursor: pointer;
}

/* CART */
.cart {
  flex: 1;
  background: #fff;
  padding: 15px;
  border-left: 2px solid #2f4f3f;
  min-width: 280px;
  box-shadow: -3px 0 15px rgba(0,0,0,0.08);
}

.cart h3 {
  color: #2f4f3f;
}

/* INPUTS */
input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

/* ORDER BUTTON */
.order-btn {
  background: #ff6b2d;
  font-weight: bold;
  padding: 12px;
  font-size: 16px;
  margin-top: 10px;
}

/* MODAL (zoom image) */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* =========================
   📱 MOBILE
========================= */
@media (max-width: 768px) {

  .container {
    flex-direction: column;
  }

  .products {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }

  .cart {
    border-left: none;
    border-top: 3px solid #2f4f3f;
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
  <p>📞 Валентина | +380934704743</p>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">
    <h3>🛒 Кошик</h3>
    <div id="cart"></div>

    <p><b>Сума: <span id="total">0</span> грн</b></p>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <input id="city" placeholder="Адреса">
    <input id="comment" placeholder="Коментар">

    <button class="order-btn" onclick="sendOrder()">
      Оформити замовлення
    </button>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <span class="close">&times;</span>
  <img id="modalImg">
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Короткое описание товара",
    images: ["img/1.jpg", "img/2.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "Товар 3",
    price: 200,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg"]
  }
];

let imgIndex = {};

renderProducts();
renderCart();

/* PRODUCTS */
function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <img src="${p.images[0]}"
             id="img-${i}"
             onclick="openModal('${p.images[0]}')">

        <button onclick="prevImg(${i})">⬅</button>
        <button onclick="nextImg(${i})">➡</button>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <p><b>${p.price} грн</b></p>

        <button onclick="add(${i})">Додати в кошик</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER FIX */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  imgIndex[i] = (getIndex(i) + 1) % products[i].images.length;
  document.getElementById(`img-${i}`).src =
    products[i].images[getIndex(i)];
}

function prevImg(i){
  imgIndex[i] =
    (getIndex(i) - 1 + products[i].images.length) %
    products[i].images.length;

  document.getElementById(`img-${i}`).src =
    products[i].images[getIndex(i)];
}

/* ZOOM */
function openModal(src){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found){
    found.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price * c.qty;

    html += `
      <div>
        ${c.name} x ${c.qty}
        <button onclick="change(${i},1)">+</button>
        <button onclick="change(${i},-1)">-</button>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;

  save();
}

function change(i, d){
  cart[i].qty += d;
  if(cart[i].qty <= 0) cart.splice(i,1);
  renderCart();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ORDER */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText} грн
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

</script>

</body>
</html>
