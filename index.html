<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* 📞 ВОЗВРАЩЕНО */
.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* 📦 FIX ВЕРСТКИ ТОВАРОВ */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  box-sizing: border-box;
  overflow-wrap: break-word;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* ===== CART ===== */
.cart {
  position: fixed;
  right: 10px;

  width: 340px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* ✍️ ЕДИНЫЙ СТИЛЬ ПОЛЕЙ */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;

  font-family: Arial;
  font-size: 14px;
  color: #333;

  box-sizing: border-box;
}

/* ORDER */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
}

/* 📌 FLOAT BUTTON */
.open-cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #2f4f3f;
  color: white;
  padding: 12px 14px;
  border-radius: 50px;

  border: none;
  cursor: pointer;
  z-index: 999;
  display: none;
}

/* MOBILE */
@media (max-width: 900px) {
.cart {
  position: relative;
  width: calc(100% - 24px);
  margin: 10px 12px;

  box-sizing: border-box;
}
}
</style>
</head>

<body>

<header id="header">
  <h2>Оберіть потрібну пропозицію</h2>

  <div class="header-info">
    📞 Валентина | +380934704743
  </div>
</header>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">

  <div class="cart-title">
    <span>🛒 Кошик</span>
    <span id="total">0 грн</span>
  </div>

  <div id="cart"></div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">
  <textarea id="city" placeholder="Адреса"></textarea>
  <textarea id="comment" placeholder="Коментар"></textarea>

  <button class="order-btn" onclick="sendOrder()">
    Оформити замовлення
  </button>

</div>

<!-- BUTTON -->
<button class="open-cart-btn" id="cartBtn" onclick="scrollToCart()">
  🛒 Кошик
</button>

<script>

/* PRODUCTS */
let products = [
 {
    name: "Товар 1 - Длиииииииииииииииииииииии ииииииииииииииииииииииииииииииииии иииииииииииииинное название товара",
    price: 100,
    description: "Длиииииииииииииииииииииии ииииииииииииииииииииииииииииииииии иииииииииииииинное описание товара",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "Товар 3 - Длиииииииииииииииииииииии ииииииииииииииииииииииииииииииииии иииииииииииииинное название товара",
    price: 100,
    description: "Длиииииииииииииииииииииии ииииииииииииииииииииииииииииииииии иииииииииииииинное описание товара",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "Товар 4",
    price: 150,
    description: "Описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "Товар 5",
    price: 150,
    description: "Описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

/* RENDER */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <!-- 📸 ВЕРНУЛ ПЕРЕКЛЮЧЕНИЕ -->
        <img src="${p.images[0]}" id="img-${i}">

        <div>
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати до кошика</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;
    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* SCROLL */
function scrollToCart(){
  document.getElementById("cartBox").scrollIntoView({behavior:"smooth"});
}

/* ORDER */
function sendOrder(){

  let order = "";
  cart.forEach(c => order += `${c.name} x ${c.qty}\n`);

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

/* BUTTON LOGIC */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    document.getElementById("cartBtn").style.display =
      e.isIntersecting ? "none" : "block";
  });
});

observer.observe(document.getElementById("cartBox"));

/* HEADER OFFSET */
window.addEventListener("load", () => {
  const h = document.getElementById("header").offsetHeight;
  document.getElementById("cartBox").style.top = (h + 10) + "px";
});

</script>

</body>
</html>
