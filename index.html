<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

.call-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  background: #3f5f4f;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* LAYOUT */
.container {
  display: flex;
  align-items: flex-start;
}

/* PRODUCTS */
.products {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  border-radius: 8px;
  user-select: none;
}

/* arrows */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 5px;
}

.controls button {
  flex: 1;
  background: #2f4f3f;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

/* ===== CART ===== */
.cart {
  flex: 1;
  background: #e9f5ea;
  margin: 15px;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  border: 1px solid #cfe6d6;
}

.cart-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  margin-bottom: 10px;
}

.cart-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  font-size: 14px;
}

/* inputs FIX */
.cart input {
  width: 100%;
  padding: 9px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* ORDER BUTTON (ЯРЧЕ, НО ПРИЯТНО) */
.order-btn {
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  font-size: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.order-btn:hover {
  transform: scale(1.02);
}

/* PHONE BUTTON (ТОЛЬКО СВЕРХУ) */
.phone-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  background: #3f5f4f;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>

  <a class="phone-btn" href="tel:+380934704743">
    📞 Валентина — подзвонити
  </a>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">

    <div class="cart-title">
      <span>🛒 Корзина</span>
      <span id="total">0 грн</span>
    </div>

    <div id="cart" class="cart-items"></div>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <input id="city" placeholder="Адреса">
    <input id="comment" placeholder="Коментар">

    <button class="order-btn" onclick="sendOrder()">
      Оформити замовлення
    </button>

  </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Короткое описание товара",
    images: ["img/1.jpg", "img/2.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let imgIndex = {};

/* PRODUCTS */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <img src="${p.images[0]}" id="img-${i}">

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <p><b>${p.price} грн</b></p>

        <button onclick="add(${i})">Додати</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* FIX SLIDER (СТАБИЛЬНО) */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  const p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  const p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;

    html += `
      <div class="cart-item">
        ${c.name} x ${c.qty}
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total + " грн";

  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ORDER */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

</script>

</body>
</html>
