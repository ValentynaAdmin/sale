<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* ===== HEADER ===== */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

/* ===== LAYOUT WRAPPER ===== */
.container {
  display: block;
}

/* ===== PRODUCTS GRID ===== */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 15px;

  padding: 15px;
  padding-right: 380px; /* место под корзину */
  box-sizing: border-box;
}

/* ===== PRODUCT CARD ===== */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* IMAGE LOCK (ВАЖНО ДЛЯ МОБИЛКИ) */
.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}

/* ===== ARROWS ===== */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.controls button {
  width: 44px;
  height: 44px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  font-weight: 900;

  border: none;
  background: #3f5f4f;
  color: white;
  border-radius: 6px;
}

/* ===== CART (DESKTOP FIXED) ===== */
.cart {
  position: fixed;
  top: 100px;
  right: 10px;

  width: 340px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  margin-bottom: 6px;
  border-radius: 8px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* ORDER BUTTON */
.order-btn {
  width: 100%;
  background: #4f9d6a;
  color: white;
  padding: 13px;
  border-radius: 12px;
  border: none;
}

/* ===== MODAL (STABLE OVERLAY) ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;
  gap: 10px;
  z-index: 9999;
}

.modal.active {
  display: flex;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* MODAL BUTTONS */
.modal button {
  width: 44px;
  height: 44px;
  font-size: 18px;
  font-weight: 900;
  border: none;
  border-radius: 6px;
}

/* CLOSE BUTTON FIX */
.modal-close {
  position: absolute;
  top: 15px;
  right: 15px;

  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: white;
  border: none;
}

/* ===== MOBILE STABLE LAYOUT ===== */
@media (max-width: 900px) {

  .products {
    padding: 10px;
  }

  .cart {
    position: relative;
    top: auto;
    right: auto;

    width: calc(100% - 20px);
    margin: 10px auto 20px auto;
    max-height: none;
  }

  .container {
    display: flex;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart" id="cartBox">
    <div id="cart"></div>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <textarea id="city" placeholder="Адреса"></textarea>
    <textarea id="comment" placeholder="Коментар"></textarea>

    <button class="order-btn" onclick="sendOrder()">Оформити замовлення</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="imgModal">
  <button class="modal-close" onclick="closeModal()">✖</button>
  <button onclick="prevModalImg()">⬅</button>
  <img id="modalImg">
  <button onclick="nextModalImg()">➡</button>
</div>

<script>

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Опис",
    images: ["img/1.jpg","img/2.jpg","img/3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

renderProducts();
renderCart();

/* GRID */
function renderProducts(){
  let html = "";

  products.forEach((p,i)=>{
    html += `
      <div class="product">
        <img src="${p.images[0]}" id="img-${i}" onclick="openImg(${i})">

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i]=0;
  return imgIndex[i];
}

function nextImg(i){
  imgIndex[i] = (getIndex(i)+1) % products[i].images.length;
  document.getElementById(`img-${i}`).src = products[i].images[getIndex(i)];
}

function prevImg(i){
  imgIndex[i] = (getIndex(i)-1+products[i].images.length)%products[i].images.length;
  document.getElementById(`img-${i}`).src = products[i].images[getIndex(i)];
}

/* CART */
function add(i){
  let f = cart.find(x=>x.name===products[i].name);
  if(f) f.qty++;
  else cart.push({...products[i],qty:1});
  save(); renderCart();
}

function renderCart(){
  let total=0,html="";
  cart.forEach(c=>{
    total+=c.price*c.qty;
    html+=`<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });
  document.getElementById("cart").innerHTML=html;
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

/* MODAL */
function openImg(i){
  document.getElementById("imgModal").classList.add("active");
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
  document.getElementById("imgModal").dataset.index = i;
}

function closeModal(){
  document.getElementById("imgModal").classList.remove("active");
}

function nextModalImg(){
  const i=document.getElementById("imgModal").dataset.index;
  nextImg(i);
  document.getElementById("modalImg").src=products[i].images[getIndex(i)];
}

function prevModalImg(){
  const i=document.getElementById("imgModal").dataset.index;
  prevImg(i);
  document.getElementById("modalImg").src=products[i].images[getIndex(i)];
}

/* ORDER */
function sendOrder(){
  alert("Замовлення відправлено!");
  cart=[];
  save();
  renderCart();
}

</script>

</body>
</html>
