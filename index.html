<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;

  /* FIX: убрал двойной конфликт */
  padding: 15px 360px 15px 15px;

  align-content: start;
  box-sizing: border-box;
}

/* PRODUCT */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  overflow: hidden;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* CART */
.cart {
  position: sticky;
  top: 90px;
  width: 340px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* ORDER */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
}

/* FLOAT BUTTON */
.open-cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2f4f3f;
  color: white;
  padding: 12px 14px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  z-index: 999;
  display: none;
}

/* CONTROLS (FIXED SIZE) */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 5px;
}

.controls button {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  font-weight: 900;

  border: none;
  background: #3f5f4f;
  color: white;
  border-radius: 6px;
}

/* MODAL FIX */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 15px;
  box-sizing: border-box;
}

/* IMAGE */
.modal img {
  max-width: 80vw;
  max-height: 80vh;
  border-radius: 10px;
}

/* MODAL BUTTONS FIX */
.modal button {
  width: 44px;
  height: 44px;
  border: none;
  background: white;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 900;
}

/* CLOSE FIX */
.modal-close {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: white;
  border: none;
  z-index: 10000;
  font-size: 18px;
  font-weight: bold;
}

/* MOBILE FIX */
@media (max-width: 900px) {
  .products {
    padding: 10px;
  }

  .cart {
    position: relative;
    width: calc(100% - 20px);
    margin: 10px auto;
  }
}

/* DESKTOP POSITION FIX */
@media (min-width: 901px) {
  .cart {
    position: fixed;
    top: 100px;
    right: 10px;
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
  <div class="header-info">📞 Валентина | +380934704743</div>
</header>

<div class="products" id="products"></div>

<div class="cart" id="cartBox">

  <div class="cart-title">
    <span>🛒 Кошик</span>
    <span id="total">0 грн</span>
  </div>

  <div id="cart"></div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">
  <textarea id="city" placeholder="Адреса"></textarea>
  <textarea id="comment" placeholder="Коментар"></textarea>

  <button class="order-btn" onclick="sendOrder()">Оформити замовлення</button>

  <p class="small">
    Безкоштовна доставка можлива за домовленістю та залежить від суми замовлення і адреси доставки.
  </p>
</div>

<button class="open-cart-btn" id="cartBtn" onclick="scrollToCart()">🛒 Кошик</button>

<!-- MODAL -->
<div class="modal" id="imgModal">
  <button class="modal-close" onclick="closeModal()">✖</button>
  <button onclick="prevModalImg()">⬅</button>
  <img id="modalImg">
  <button onclick="nextModalImg()">➡</button>
</div>

<script>
// твой JS оставлен как есть (не ломаю логику)
</script>

</body>
</html>
