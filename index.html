<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

/* LAYOUT */
.container {
  display: flex;
}

/* PRODUCTS */
.products {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* IMAGE */
.product img {
  width: 100%;
  border-radius: 8px;
  user-select: none;
  -webkit-user-drag: none;
}

/* arrows */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 5px;
}

.controls button {
  flex: 1;
  background: #3f5f4f;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== CART (ПОЛНОСТЬЮ ПЕРЕДЕЛАНА) ===== */
.cart {
  flex: 1;
  background: #e7f3ea;
  padding: 15px;
  margin: 15px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border: 1px solid #cfe6d6;
}

.cart h3 {
  color: #2f4f3f;
}

/* inputs */
input {
  width: 100%;
  padding: 9px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON (мягче) */
.order-btn {
  background: #6f8f7f;
  color: white;
  font-weight: 600;
  padding: 11px;
  font-size: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.order-btn:hover {
  background: #5f7f6f;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .cart {
    margin: 10px;
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
  <p>📞 Валентина | +380934704743</p>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">
    <h3>🛒 Кошик</h3>
    <div id="cart"></div>

    <p><b>Сума: <span id="total">0</span> грн</b></p>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <input id="city" placeholder="Адреса">
    <input id="comment" placeholder="Коментар">

    <button class="order-btn" onclick="sendOrder()">
      Оформити замовлення
    </button>
  </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Короткое описание товара",
    images: ["img/1.jpg", "img/2.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let imgIndex = {};
let startX = 0;

/* ===== PRODUCTS ===== */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <img 
          src="${p.images[0]}" 
          id="img-${i}"
          onpointerdown="startSwipe(event, ${i})"
          onpointerup="endSwipe(event, ${i})"
        >

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <p><b>${p.price} грн</b></p>

        <button onclick="add(${i})">Додати в кошик</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* ===== SLIDER (СТАБИЛЬНЫЙ) ===== */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  const p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  const p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* ===== SWIPE FIX (без конфликтов) ===== */
function startSwipe(e, i){
  startX = e.clientX || e.touches?.[0].clientX;
}

function endSwipe(e, i){
  let endX = e.clientX || e.changedTouches?.[0].clientX;
  if(!startX || !endX) return;

  let diff = startX - endX;

  if(Math.abs(diff) < 40) return;

  if(diff > 0){
    nextImg(i);
  } else {
    prevImg(i);
  }
}

/* ===== CART ===== */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found){
    found.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price * c.qty;

    html += `
      <div>
        ${c.name} x ${c.qty}
        <button onclick="change(${i},1)">+</button>
        <button onclick="change(${i},-1)">-</button>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;

  save();
}

function change(i, d){
  cart[i].qty += d;
  if(cart[i].qty <= 0) cart.splice(i,1);
  renderCart();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ===== ORDER ===== */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText} грн
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

</script>

</body>
</html>
