<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* ===== LAYOUT (НОВАЯ АРХИТЕКТУРА) ===== */
.container {
  display: flex;
  gap: 15px;
  align-items: flex-start;
  padding: 15px;
}

/* PRODUCTS */
.products {
  flex: 1;
  display: grid;

  /* минимум 2 товара, но может больше */
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));

  gap: 15px;
  box-sizing: border-box;
}

/* PRODUCT */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  overflow: hidden;
  box-sizing: border-box;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* ===== CART (БЕЗ ПЕРЕКРЫТИЙ) ===== */
.cart {
  width: 340px;
  flex-shrink: 0;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);

  max-height: calc(100vh - 100px);
  overflow-y: auto;

  position: sticky;
  top: 10px;
}

/* CART ITEMS */
.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* BUTTON */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
  transition: 0.2s;
}

.order-btn:hover {
  transform: scale(1.03);
}

/* ===== ARROWS (ФИКС РАЗМЕРА) ===== */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.controls button {
  flex: 1;
  height: 42px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  font-weight: 900;

  background: #3f5f4f;
  color: white;
  border: none;
  border-radius: 6px;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;
  gap: 10px;

  padding: 10px;
  box-sizing: border-box;
}

.modal img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 10px;
}

.modal button {
  min-width: 44px;
  min-height: 44px;

  background: rgba(255,255,255,0.2);
  color: white;

  border: none;
  border-radius: 10px;

  font-size: 18px;
  font-weight: 900;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

  .container {
    flex-direction: column;
  }

  .cart {
    width: calc(100% - 20px);
    margin: 0 auto;
    max-height: none;
  }

  .products {
    padding: 0;
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
  <div class="header-info">📞 Валентина | +380934704743</div>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart" id="cartBox">

    <div class="cart-title">
      <span>🛒 Кошик</span>
      <span id="total">0 грн</span>
    </div>

    <div id="cart"></div>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <textarea id="city" placeholder="Адреса"></textarea>
    <textarea id="comment" placeholder="Коментар"></textarea>

    <button class="order-btn" onclick="sendOrder()">
      Оформити замовлення
    </button>

    <p style="font-size:13px; opacity:0.7; margin-top:10px;">
      Безкоштовна доставка можлива за домовленістю та залежить від суми замовлення і адреси доставки.
    </p>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="imgModal">
  <button onclick="prevModal()">⬅</button>
  <img id="modalImg">
  <button onclick="nextModal()">➡</button>
  <button onclick="closeModal()">✖</button>
</div>

<script>

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Опис",
    images: ["img/1.jpg","img/2.jpg","img/3.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Опис",
    images: ["img/1-1.jpg","img/1-2.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};
let modalIndex = 0;

/* PRODUCTS */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p,i)=>{

    html += `
      <div class="product">

        <img src="${p.images[0]}" id="img-${i}"
          onclick="openModal(${i})"
        >

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i]=0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i)+1)%p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i)-1+p.images.length)%p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* MODAL */
function openModal(i){
  modalIndex = i;
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
  document.getElementById("imgModal").style.display="flex";
}

function closeModal(){
  document.getElementById("imgModal").style.display="none";
}

function nextModal(){
  nextImg(modalIndex);
  document.getElementById("modalImg").src = products[modalIndex].images[getIndex(modalIndex)];
}

function prevModal(){
  prevImg(modalIndex);
  document.getElementById("modalImg").src = products[modalIndex].images[getIndex(modalIndex)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x=>x.name===item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let total=0;
  let html="";

  cart.forEach(c=>{
    total += c.price*c.qty;
    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ORDER */
function sendOrder(){
  let order="";

  cart.forEach(c=>{
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:`
Нове замовлення:

${order}

Ім'я: ${name.value}
Телефон: ${phone.value}
Адреса: ${city.value}
Коментар: ${comment.value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart=[];
  save();
  renderCart();
}

</script>

</body>
</html>
