<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Магазин</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; display:inline-block; width:200px;}
    img { width: 100%; }
    .cart { position: fixed; right: 20px; top: 20px; background: #f5f5f5; padding: 15px; }
    button { margin-top: 5px; }
  </style>
</head>
<body>

<h1>Мой магазин</h1>

<div id="products"></div>

<div class="cart">
  <h3>Корзина</h3>
  <div id="cart"></div>
  <button onclick="checkout()">Оформить</button>
</div>

<script>
const products = [
  {
    name: "Товар 1",
    price: 10,
    img: "https://via.placeholder.com/200"
  },
  {
    name: "Товар 2",
    price: 20,
    img: "https://via.placeholder.com/200"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";
  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.price} €</p>
        <input type="number" min="1" value="1" id="qty${i}">
        <button onclick="addToCart(${i})">В корзину</button>
      </div>
    `;
  });
}

function addToCart(i) {
  const qty = document.getElementById("qty"+i).value;
  cart.push({...products[i], qty});
  renderCart();
}

function renderCart() {
  const c = document.getElementById("cart");
  c.innerHTML = "";
  cart.forEach(item => {
    c.innerHTML += `<p>${item.name} x ${item.qty}</p>`;
  });
}

function checkout() {
  let order = "";
  cart.forEach(i => {
    order += `${i.name} x ${i.qty}\n`;
  });

  const name = prompt("Ваше имя:");
  const phone = prompt("Телефон:");
  const address = prompt("Адрес:");

  const text = `Заказ:\n${order}\nИмя: ${name}\nТелефон: ${phone}\nАдрес: ${address}`;

  window.location.href = "mailto:your@email.com?subject=Заказ&body=" + encodeURIComponent(text);
}

renderProducts();
</script>

</body>
</html>
