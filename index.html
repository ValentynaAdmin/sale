<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>–Ь–∞–≥–∞–Ј–Є–љ</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* рЯУЮ –Т–Ю–Ч–Т–†–Р–©–Х–Э–Ю */
.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* рЯУ¶ FIX –Т–Х–†–°–Ґ–Ъ–Ш –Ґ–Ю–Т–Р–†–Ю–Т */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  box-sizing: border-box;
  overflow-wrap: break-word;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* ===== CART ===== */
.cart {
  position: fixed;
  right: 10px;

  width: 340px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* вЬНпЄП –Х–Ф–Ш–Э–Ђ–Щ –°–Ґ–Ш–Ы–ђ –Я–Ю–Ы–Х–Щ */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;

  font-family: Arial;
  font-size: 14px;
  color: #333;

  box-sizing: border-box;
}

/* ORDER */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
}

/* рЯУМ FLOAT BUTTON */
.open-cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #2f4f3f;
  color: white;
  padding: 12px 14px;
  border-radius: 50px;

  border: none;
  cursor: pointer;
  z-index: 999;
  display: none;
}

/* MOBILE */
@media (max-width: 900px) {
.cart {
  position: relative;
  width: calc(100% - 24px);
  margin: 10px 12px;

  box-sizing: border-box;
}
}

/* ===== MODAL ZOOM ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}
</style>
</head>

<body>

<header id="header">
  <h2>–Ю–±–µ—А—Ц—В—М –њ–Њ—В—А—Ц–±–љ—Г –њ—А–Њ–њ–Њ–Ј–Є—Ж—Ц—О</h2>

  <div class="header-info">
    рЯУЮ –Т–∞–ї–µ–љ—В–Є–љ–∞ | +380934704743
  </div>
</header>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">

  <div class="cart-title">
    <span>рЯЫТ –Ъ–Њ—И–Є–Ї</span>
    <span id="total">0 –≥—А–љ</span>
  </div>

  <div id="cart"></div>

  <input id="name" placeholder="–Ж–Љ'—П">
  <input id="phone" placeholder="–Ґ–µ–ї–µ—Д–Њ–љ">
  <textarea id="city" placeholder="–Р–і—А–µ—Б–∞"></textarea>
  <textarea id="comment" placeholder="–Ъ–Њ–Љ–µ–љ—В–∞—А"></textarea>

  <button class="order-btn" onclick="sendOrder()">
    –Ю—Д–Њ—А–Љ–Є—В–Є –Ј–∞–Љ–Њ–≤–ї–µ–љ–љ—П
  </button>

</div>

<!-- BUTTON -->
<button class="open-cart-btn" id="cartBtn" onclick="scrollToCart()">
  рЯЫТ –Ъ–Њ—И–Є–Ї
</button>

<script>

/* PRODUCTS */
let products = [
 {
    name: "–Ґ–Њ–≤–∞—А 1 - –Ф–ї–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–љ–љ–Њ–µ –љ–∞–Ј–≤–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    price: 100,
    description: "–Ф–ї–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–љ–љ–Њ–µ –Њ–њ–Є—Б–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "–Ґ–Њ–≤–∞—А 2",
    price: 150,
    description: "–Ю–њ–Є—Б–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "–Ґ–Њ–≤–∞—А 3 - –Ф–ї–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–љ–љ–Њ–µ –љ–∞–Ј–≤–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    price: 100,
    description: "–Ф–ї–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є –Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–Є–љ–љ–Њ–µ –Њ–њ–Є—Б–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "–Ґ–Њ–≤–∞—А 4",
    price: 150,
    description: "–Ю–њ–Є—Б–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "–Ґ–Њ–≤–∞—А 5",
    price: 150,
    description: "–Ю–њ–Є—Б–∞–љ–Є–µ —В–Њ–≤–∞—А–∞",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

/* RENDER */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <!-- рЯУЄ –Т–Х–†–Э–£–Ы –Я–Х–†–Х–Ъ–Ы–Ѓ–І–Х–Э–Ш–Х -->
        <img 
  src="${p.images[0]}" 
  id="img-${i}"
  onpointerdown="startSwipe(event)"
  onpointerup="endSwipe(event, ${i})"
  onclick="openImg(${i})"
>

        <div>
          <button onclick="prevImg(${i})">вђЕ</button>
          <button onclick="nextImg(${i})">вЮ°</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} –≥—А–љ</b>

        <button onclick="add(${i})">–Ф–Њ–і–∞—В–Є –і–Њ –Ї–Њ—И–Є–Ї–∞</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;
    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* SCROLL */
function scrollToCart(){
  document.getElementById("cartBox").scrollIntoView({behavior:"smooth"});
}

/* ORDER */
function sendOrder(){

  let order = "";
  cart.forEach(c => order += `${c.name} x ${c.qty}\n`);

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
–Э–Њ–≤–µ –Ј–∞–Љ–Њ–≤–ї–µ–љ–љ—П:

${order}

–Ж–Љ'—П: ${document.getElementById("name").value}
–Ґ–µ–ї–µ—Д–Њ–љ: ${document.getElementById("phone").value}
–Р–і—А–µ—Б–∞: ${document.getElementById("city").value}
–Ъ–Њ–Љ–µ–љ—В–∞—А: ${document.getElementById("comment").value}

–°—Г–Љ–∞: ${document.getElementById("total").innerText}
`
    })
  });

  alert("–Ч–∞–Љ–Њ–≤–ї–µ–љ–љ—П –≤—Ц–і–њ—А–∞–≤–ї–µ–љ–Њ!");
  cart = [];
  save();
  renderCart();
}

/* BUTTON LOGIC */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    document.getElementById("cartBtn").style.display =
      e.isIntersecting ? "none" : "block";
  });
});

observer.observe(document.getElementById("cartBox"));

/* HEADER OFFSET */
window.addEventListener("load", () => {
  const h = document.getElementById("header").offsetHeight;
  document.getElementById("cartBox").style.top = (h + 10) + "px";
});

let startX = 0;

/* SWIPE START */
function startSwipe(e){
  startX = e.clientX || e.touches?.[0].clientX;
}

/* SWIPE END */
function endSwipe(e, i){
  let endX = e.clientX || e.changedTouches?.[0].clientX;
  if(!startX || !endX) return;

  let diff = startX - endX;

  if(Math.abs(diff) < 40) return;

  if(diff > 0){
    nextImg(i);
  } else {
    prevImg(i);
  }
}

/* OPEN IMAGE */
function openImg(i){
  const p = products[i];
  const idx = getIndex(i);

  document.getElementById("modalImg").src = p.images[idx];
  document.getElementById("imgModal").style.display = "flex";
}

/* CLOSE */
function closeModal(){
  document.getElementById("imgModal").style.display = "none";
}

</script>

<!-- MODAL ZOOM -->
<div class="modal" id="imgModal" onclick="closeModal()">
  <img id="modalImg">
</div>

</body>
</html>
