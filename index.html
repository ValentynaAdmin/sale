<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 15px 360px 15px 15px;
  box-sizing: border-box;
}

/* DESKTOP FIX */
@media (min-width: 901px) {
  .products {
    padding-right: 360px;
  }
}

/* MOBILE */
@media (max-width: 900px) {
  .products {
    padding: 10px;
  }

  .cart {
    position: relative;
    width: calc(100% - 20px);
    margin: 10px auto 20px auto;
  }
}

/* PRODUCT CARD */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* IMAGE */
.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* CONTROLS (СТРЕЛКИ) */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.controls button {
  flex: 1;
  min-width: 44px;
  min-height: 44px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  background: #3f5f4f;
  color: white;
  border-radius: 6px;
}

/* CART */
.cart {
  position: sticky;
  top: 100px;
  width: 340px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
}

/* CART ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  margin-bottom: 6px;
  border-radius: 8px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
.order-btn {
  width: 100%;
  background: #4f9d6a;
  color: white;
  padding: 13px;
  border-radius: 12px;
  border: none;
}

/* MODAL FIX */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  gap: 10px;
  z-index: 9999;
}

.modal.active {
  display: flex;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* MODAL BUTTONS */
.modal button {
  min-width: 44px;
  min-height: 44px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 6px;
}

.modal-close {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 44px;
  height: 44px;
  background: white;
  border-radius: 50%;
  border: none;
  z-index: 10000;
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
  <div class="header-info">📞 Валентина | +380934704743</div>
</header>

<div class="products" id="products"></div>

<div class="cart" id="cartBox">
  <h3>🛒 Кошик</h3>
  <div id="cart"></div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">
  <textarea id="city" placeholder="Адреса"></textarea>
  <textarea id="comment" placeholder="Коментар"></textarea>

  <button class="order-btn" onclick="sendOrder()">Оформити замовлення</button>

  <p class="small">
    Безкоштовна доставка можлива за домовленістю та залежить від суми замовлення і адреси доставки.
  </p>
</div>

<!-- MODAL -->
<div class="modal" id="imgModal">
  <button class="modal-close" onclick="closeModal()">✖</button>
  <button onclick="prevModalImg()">⬅</button>
  <img id="modalImg">
  <button onclick="nextModalImg()">➡</button>
</div>

<script>

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Опис",
    images: ["img/1.jpg","img/2.jpg","img/3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

renderProducts();
renderCart();

/* PRODUCTS */
function renderProducts(){
  let html = "";

  products.forEach((p,i)=>{
    html += `
      <div class="product">
        <img src="${p.images[0]}" id="img-${i}" onclick="openImg(${i})">

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i]=0;
  return imgIndex[i];
}

function nextImg(i){
  imgIndex[i] = (getIndex(i)+1) % products[i].images.length;
  document.getElementById(`img-${i}`).src = products[i].images[getIndex(i)];
}

function prevImg(i){
  imgIndex[i] = (getIndex(i)-1+products[i].images.length)%products[i].images.length;
  document.getElementById(`img-${i}`).src = products[i].images[getIndex(i)];
}

/* MODAL */
function openImg(i){
  document.getElementById("imgModal").classList.add("active");
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
  document.getElementById("imgModal").dataset.index = i;
}

function closeModal(){
  document.getElementById("imgModal").classList.remove("active");
}

function nextModalImg(){
  const i = document.getElementById("imgModal").dataset.index;
  nextImg(i);
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
}

function prevModalImg(){
  const i = document.getElementById("imgModal").dataset.index;
  prevImg(i);
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
}

/* CART */
function add(i){
  let f = cart.find(x=>x.name===products[i].name);
  if(f) f.qty++;
  else cart.push({...products[i],qty:1});
  save(); renderCart();
}

function renderCart(){
  let total=0,html="";
  cart.forEach(c=>{
    total+=c.price*c.qty;
    html+=`<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });
  document.getElementById("cart").innerHTML=html;
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

/* ORDER */
function sendOrder(){
  let order="";
  cart.forEach(c=>order+=`${c.name} x ${c.qty}\n`);

  fetch("https://formspree.io/f/xrevoywb",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:order})
  });

  alert("Замовлення відправлено!");
  cart=[];
  save();
  renderCart();
}

</script>

</body>
</html>
