<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
  height: 100%;
  overflow-x: hidden;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* 📞 ВОЗВРАЩЕНО */
.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

.container {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* PRODUCTS */
.products {
  flex: 1;
  min-width: 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
  box-sizing: border-box;
  padding-right: 0;
}

@media (max-width: 1450px) {

  .products {
    padding: 15px;
  }

  .cart {
    position: relative;
    top: auto;
    right: auto;
    width: calc(100% - 24px);
    margin: 10px 12px 24px 12px;
    max-height: none;
  }
}

/* 📦 FIX ВЕРСТКИ ТОВАРОВ */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  box-sizing: border-box;
  overflow-wrap: break-word;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* ===== CART ===== */
.cart {
  flex: 0 0 340px;

  position: sticky;
  top: 100px;

  max-height: none; 
  overflow-y: visible;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
  
/* TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* ✍️ ЕДИНЫЙ СТИЛЬ ПОЛЕЙ */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;

  font-family: Arial;
  font-size: 14px;
  color: #333;

  box-sizing: border-box;
}

/* ORDER */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
  transition: 0.2s;
}

/* 📌 FLOAT BUTTON */
.open-cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #2f4f3f;
  color: white;
  padding: 12px 14px;
  border-radius: 50px;

  border: none;
  cursor: pointer;
  z-index: 999;
  display: none;
}

/* MOBILE */
@media (max-width: 900px) {
  .cart {
    position: relative;
    width: 100%;
    box-sizing: border-box;
    margin: 10px auto 10px auto; /* одинаково сверху/снизу */
    max-height: none;
  }

  .products {
  padding: 10px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  }

  .container {
    flex-direction: column;
    gap: 10px;
  }

  .modal {
    padding: 5px;
  }

  .modal img {
    max-width: 95%;
    max-height: 80vh;
  }
}

/* ===== MODAL ZOOM ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;

  gap: 5px;
  padding: 5px;
  box-sizing: border-box;

  overflow: hidden;
}

.modal img {
  max-width: calc(100vw - 110px);
  max-height: 85vh;
  border-radius: 10px;
}

.modal button {
  min-width: 44px;
  min-height: 44px;

  background: rgba(255,255,255,0.15);
  color: white;

  border: none;
  border-radius: 10px;

  font-size: 20px;
  font-weight: 900;
}

.controls {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  height: 44px;
}

.controls button {
  flex: 1;
  background: #3f5f4f;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 900;
  font-size: 16px;
}

.order-btn:hover {
  transform: scale(1.03);
}

.controls button {
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 20px;
  font-weight: 900;

  padding: 0;
  line-height: 1;
}

.modal button {
  min-width: 44px;
  min-height: 44px;

  background: rgba(255,255,255,0.15);
  color: white;

  border: none;
  border-radius: 10px;

  font-size: 20px;
  font-weight: 900;
}

.container {
  gap: 10px;
  align-items: flex-start;
}

.products {
  padding-bottom: 10px;
}

.product {
  overflow: hidden;
min-width: 0;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;

  width: 44px;
  height: 44px;

  border: none;
  border-radius: 50%;
  background: white;

  font-size: 20px;
  font-weight: bold;

  z-index: 100;
}

</style>
</head>

<body>

<header id="header">
  <h2>Оберіть потрібну пропозицію</h2>

  <div class="header-info">
    📞 Валентина | +380934704743
  </div>
</header>

<div class="container">
  <div class="products" id="products"></div>
  <div class="cart" id="cartBox">

  <div class="cart-title">
    <span>🛒 Кошик</span>
    <span id="total">0 грн</span>
  </div>

  <div id="cart"></div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">
  <textarea id="city" placeholder="Адреса"></textarea>
  <textarea id="comment" placeholder="Коментар"></textarea>

  <button class="order-btn" onclick="sendOrder()">
    Оформити замовлення
  </button>

<p class="small">
  Безкоштовна доставка можлива за домовленістю та залежить від суми замовлення і адреси доставки.
</p>

</div>

<!-- BUTTON -->
<button class="open-cart-btn" id="cartBtn" onclick="scrollToCart()">
  🛒 Кошик
</button>

<script>

/* PRODUCTS */
let products = [
 {
    name: "Товар 1 - Длиииииииииииииииииииииии ииииииииииииииииииииииииииииииииии иииииииииииииинное название товара",
    price: 100,
    description: "Длиииииииииииииииииииииии ииииииииииииииииииииииииииииииииии иииииииииииииинное описание товара",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "Банки скляні 3л",
    price: 20,
    description: "Вживані, але в гарному стані",
    images: ["img/Banki 3L.jpg"]
  },
    {
    name: "Банки скляні 1л",
    price: 15,
    description: "Вживані, але в гарному стані",
    images: ["img/Banky.jpg"]
  },
    {
    name: "Банки скляні 0,5л",
    price: 10,
    description: "Вживані, але в гарному стані",
    images: ["img/Banky.jpg"]
  },
  {
    name: "Бандаж грижовий уніфікований Медтекстиль 5011 розмір M/L",
    price: 550,
    description: "Коробка відкрита, але товар абсолютно новий і жодного разу не був у використанні. Бандаж грижовий уніфікований застосовується при пахових і стегнових грижах, коли оперативне лікування протипоказане або не може бути проведене в прийнятні терміни і рекомендують при високій ймовірності випадання або утиску грижі, а також після операції з пахової або стегнової гриж. Бандаж використовується для попередження збільшення грижі при значних фізичних навантаженнях, пов’язаних з підняттям ваги",
    images: ["img/Бандаж грижовий_1.jpg", "img/Бандаж грижовий_2.jpg", "img/Бандаж грижовий_3.jpg"]
  },
  {
    name: "Шишки соснові для розпалювання",
    price: 150,
    description: "Сухі соснові шишки - ідеально підходять для швидкого та зручного розпалювання мангалу, печі чи багаття. Горять рівно, дають хороший жар і приємний аромат. Ціна вказана за пакет 35л. При замовленні кількох мпакетів - бонусом додам пів пакету ялинових шишок",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

/* RENDER */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <!-- 📸 ВЕРНУЛ ПЕРЕКЛЮЧЕНИЕ -->
        <img 
  src="${p.images[0]}" 
  id="img-${i}"
  onpointerdown="startSwipe(event)"
  onpointerup="endSwipe(event, ${i})"
  onclick="openImg(${i})"
>

      <div class="controls">
<button onclick="prevImg(${i})">&#x2190;</button>
<button onclick="nextImg(${i})">&#x2192;</button>
</div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати до кошика</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function changeQty(i, delta){
  cart[i].qty += delta;

  if(cart[i].qty <= 0){
    cart.splice(i, 1);
  }

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price * c.qty;

    html += `
      <div class="cart-item">
        <div style="margin-bottom:5px;">
          ${c.name}
        </div>

        <div style="display:flex; align-items:center; gap:8px;">
          <button onclick="changeQty(${i}, -1)">-</button>
          <b>${c.qty}</b>
          <button onclick="changeQty(${i}, 1)">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerHTML = `Итого: <b>${total}</b> грн`;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* SCROLL */
function scrollToCart(){
  document.getElementById("cartBox").scrollIntoView({behavior:"smooth"});
}

/* ORDER */
function sendOrder(){

  let order = "";
  cart.forEach(c => order += `${c.name} x ${c.qty}\n`);

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

/* BUTTON LOGIC */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    document.getElementById("cartBtn").style.display =
      e.isIntersecting ? "none" : "block";
  });
});

observer.observe(document.getElementById("cartBox"));

/* HEADER OFFSET */
window.addEventListener("load", () => {
  const h = document.getElementById("header").offsetHeight;
  document.getElementById("cartBox").style.top = (h + 10) + "px";
});

let startX = 0;

/* SWIPE START */
function startSwipe(e){
  startX = e.clientX || e.touches?.[0].clientX;
}

/* SWIPE END */
function endSwipe(e, i){
  let endX = e.clientX || e.changedTouches?.[0].clientX;
  if(!startX || !endX) return;

  let diff = startX - endX;

  if(Math.abs(diff) < 40) return;

  if(diff > 0){
    nextImg(i);
  } else {
    prevImg(i);
  }
}


/* CLOSE */
function closeModal(){
  document.getElementById("imgModal").style.display = "none";
}

function openImg(i){
  const p = products[i];
  const idx = getIndex(i);

  document.getElementById("modalImg").src = p.images[idx];
  document.getElementById("imgModal").style.display = "flex";

  // сохраняем индекс товара
  document.getElementById("imgModal").dataset.index = i;
}

function nextModalImg(){
  const i = document.getElementById("imgModal").dataset.index;

  nextImg(i);
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
}

function prevModalImg(){
  const i = document.getElementById("imgModal").dataset.index;

  prevImg(i);
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
}

</script>

<!-- MODAL ZOOM -->
<div class="modal" id="imgModal">

  <button class="modal-close" onclick="closeModal()">✖</button>

  <button onclick="prevModalImg()">&#x2190;</button>

  <img id="modalImg">

  <button onclick="nextModalImg()">&#x2192;</button>

</div>

</div>
</body>
</html>
