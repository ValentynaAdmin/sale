<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 16px;
}

/* PHONE (НЕ КНОПКА) */
.phone {
  margin-top: 6px;
  font-size: 14px;
  opacity: 0.9;
}

/* LAYOUT */
.container {
  display: flex;
  align-items: flex-start;
}

/* PRODUCTS */
.products {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* IMAGE (фикс размер, чтобы не прыгало) */
.product img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 8px;
  cursor: zoom-in;
}

/* arrows */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 5px;
}

.controls button {
  flex: 1;
  background: #2f4f3f;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

/* ===== CART FIXED ===== */
.cart {
  position: fixed;
  right: 15px;
  top: 15px;

  width: 320px;
  max-height: 92vh;
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

/* CART TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;

  resize: vertical;
  min-height: 40px;
  max-height: 120px;
}

/* ORDER BUTTON (без прыжков) */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  font-size: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;

  transition: 0.2s;
}

.order-btn:hover {
  transform: scale(1.03);
}

/* MODAL IMAGE */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width: 900px) {
  .cart {
    position: relative;
    width: auto;
    margin: 10px;
  }

  .container {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <div>Оберіть потрібну пропозицію</div>
  <div class="phone">📞 Валентина | +380934704743</div>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">

    <div class="cart-title">
      <span>🛒 Корзина</span>
      <span id="total">0 грн</span>
    </div>

    <div id="cart"></div>

    <input id="name" placeholder="Ім'я">

    <textarea id="city" placeholder="Адреса"></textarea>
    <textarea id="comment" placeholder="Коментар"></textarea>

    <input id="phone" placeholder="Телефон">

    <button class="order-btn" onclick="sendOrder()">
      Оформити замовлення
    </button>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

/* ===== YOUR PRODUCTS (вставил как есть) ===== */
let products = [
  {
    name: "Товар 1 - длинное название товара. длинное название товара",
    price: 100,
    description: "Короткое описание товара описание товара описание товара описание товараописание товара описание товараописание товара описание товара",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "Товар 3",
    price: 100,
    description: "Короткое описание товара",
    images: ["img/1.jpg", "img/2.jpg"]
  },
  {
    name: "Товар 4",
    price: 150,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

/* ===== RENDER PRODUCTS ===== */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {
    html += `
      <div class="product">

        <img src="${p.images[0]}"
             onclick="openModal('${p.images[0]}')"
             id="img-${i}">

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* ===== SLIDER ===== */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* ===== MODAL ===== */
function openModal(src){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== CART ===== */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;

    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;

  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ===== ORDER ===== */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

</script>

</body>
</html>
