<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: flex;
}

/* товары */
.products {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  border-radius: 8px;
}

button {
  background: #2f4f3f;
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
  margin-top: 5px;
  border-radius: 6px;
  cursor: pointer;
}

/* корзина */
.cart {
  flex: 1;
  background: white;
  padding: 15px;
  border-left: 1px solid #ddd;
  min-width: 280px;
}

input {
  width: 100%;
  padding: 6px;
  margin: 5px 0;
}

.small {
  font-size: 13px;
  color: gray;
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
  <p>📞 +380934704743</p>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">
    <h3>Кошик</h3>
    <div id="cart"></div>

    <p><b>Сума: <span id="total">0</span> грн</b></p>

    <h4>Оформлення</h4>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <input id="city" placeholder="Адреса">
    <input id="comment" placeholder="Коментар">

    <button onclick="sendOrder()">Оформити замовлення</button>

    <p class="small">Доставка: Можлива доставка в залежності від адреси.</p>
  </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let products = [
  {
    name: "Товар 1",
    price: 100,
    description: "Короткое описание товара",
    images: ["img/1.jpg", "img/2.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  },
  {
    name: "Товар 3",
    price: 200,
    description: "Короткое описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let imgIndex = {};

renderProducts();
renderCart();

/* ===== ТОВАРЫ ===== */
function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">
        <div>
          <img src="${p.images[0]}" id="img-${i}">
          <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="prevImg(${i})">⬅</button>
            <button onclick="nextImg(${i})">➡</button>
          </div>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <p><b>${p.price} грн</b></p>

        <button onclick="add(${i})">Додати в кошик</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* ===== КОРЗИНА ===== */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found){
    found.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price * c.qty;

    html += `
      <div>
        ${c.name} x ${c.qty}
        <button onclick="change(${i},1)">+</button>
        <button onclick="change(${i},-1)">-</button>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;

  save();
}

function change(i, d){
  cart[i].qty += d;
  if(cart[i].qty <= 0) cart.splice(i,1);
  renderCart();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ===== ОТПРАВКА ===== */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  const data = {
    message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Місто: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText} грн
`
  };

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert("Замовлення відправлено!");

  cart = [];
  save();
  renderCart();
}

/* ===== СЛАЙДЕР ===== */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function renderImg(i){
  document.getElementById(`img-${i}`).src =
    products[i].images[getIndex(i)];
}

function nextImg(i){
  imgIndex[i] = (getIndex(i) + 1) % products[i].images.length;
  renderImg(i);
}

function prevImg(i){
  imgIndex[i] = (getIndex(i) - 1 + products[i].images.length) %
    products[i].images.length;
  renderImg(i);
}

</script>

</body>
</html>
