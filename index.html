<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розпродаж</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.header-info {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 15px 360px 15px 15px;
  align-content: start;
  box-sizing: border-box;
}

/* FIX MOBILE GRID SPACE */
@media (max-width: 900px) {
  .products {
    padding: 10px;
  }
}

/* PRODUCT */
.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  box-sizing: border-box;
  overflow: hidden;
}

.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 5px;
}

.controls button {
  width: 44px;
  height: 38px;

  background: #3f5f4f;
  color: white;

  border: none;
  border-radius: 8px;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  font-weight: 900;
}

/* CART */
.cart {
  position: sticky;
  top: 90px;

  width: 340px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;

  background: #e9f5ea;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

@media (min-width: 901px) {
  .cart {
    position: fixed;
    top: 100px;
    right: 10px;
  }

  .products {
    padding-right: 380px;
  }
}

@media (max-width: 900px) {
  .cart {
    position: relative;
    width: calc(100% - 20px);
    margin: 10px auto;
  }
}

/* CART ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* INPUTS */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: Arial;
}

/* BUTTON */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  border-radius: 12px;
  border: none;
  transition: 0.2s;
}

.order-btn:hover {
  transform: scale(1.03);
}

/* FLOAT BUTTON */
.open-cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #2f4f3f;
  color: white;
  padding: 12px 14px;
  border-radius: 50px;

  border: none;
  cursor: pointer;
  z-index: 999;
  display: none;
}

/* MODAL FIX (КЛЮЧЕВОЙ БАГ) */
.modal {
  display: none; /* FIX */
  position: fixed;
  inset: 0;
  z-index: 9999;

  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;
  flex-direction: column;

  gap: 10px;
}

.modal.active {
  display: flex;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.modal button {
  min-width: 44px;
  min-height: 44px;
  font-size: 20px;
  font-weight: 900;
  z-index: 10;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;

  width: 44px;
  height: 44px;

  border: none;
  border-radius: 50%;
  background: white;
  font-size: 20px;
  font-weight: bold;
}

/* SMALL TEXT FIX */
.small {
  font-size: 13px;
  color: gray;
}
</style>
</head>

<body>

<header id="header">
  <h2>Оберіть потрібну пропозицію</h2>
  <div class="header-info">📞 Валентина | +380934704743</div>
</header>

<div class="container">
  <div class="products" id="products"></div>

  <div class="cart" id="cartBox">

    <div class="cart-title">
      <span>🛒 Кошик</span>
      <span id="total">0 грн</span>
    </div>

    <div id="cart"></div>

    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <textarea id="city" placeholder="Адреса"></textarea>
    <textarea id="comment" placeholder="Коментар"></textarea>

    <button class="order-btn" onclick="sendOrder()">Оформити замовлення</button>

    <p class="small">
      Безкоштовна доставка можлива за домовленістю та залежить від суми замовлення і адреси доставки.
    </p>
  </div>
</div>

<button class="open-cart-btn" id="cartBtn" onclick="scrollToCart()">🛒 Кошик</button>

<!-- MODAL -->
<div class="modal" id="imgModal">
  <button class="modal-close" onclick="closeModal()">✖</button>
  <button onclick="prevModalImg()">⬅</button>
  <img id="modalImg">
  <button onclick="nextModalImg()">➡</button>
</div>

<script>

let products = [/* ТВОИ ТОВАРЫ БЕЗ ИЗМЕНЕНИЙ */];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};
let startX = 0;

/* PRODUCTS */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {
    html += `
      <div class="product">

        <img src="${p.images[0]}"
          id="img-${i}"
          onpointerdown="startSwipe(event)"
          onpointerup="endSwipe(event, ${i})"
          onclick="openImg(${i})"
        >

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <button onclick="add(${i})">Додати до кошика</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER SAFE */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* SWIPE SAFE */
function startSwipe(e){
  startX = e.clientX || e.touches?.[0].clientX;
}

function endSwipe(e, i){
  let endX = e.clientX || e.changedTouches?.[0].clientX;
  if(!startX || !endX) return;

  let diff = startX - endX;
  if(Math.abs(diff) < 40) return;

  diff > 0 ? nextImg(i) : prevImg(i);
}

/* MODAL FIX */
function openImg(i){
  const idx = getIndex(i);
  document.getElementById("modalImg").src = products[i].images[idx];

  document.getElementById("imgModal").classList.add("active");
  document.getElementById("imgModal").dataset.index = i;
}

function closeModal(){
  document.getElementById("imgModal").classList.remove("active");
}

function nextModalImg(){
  const i = document.getElementById("imgModal").dataset.index;
  nextImg(i);
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
}

function prevModalImg(){
  const i = document.getElementById("imgModal").dataset.index;
  prevImg(i);
  document.getElementById("modalImg").src = products[i].images[getIndex(i)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  found ? found.qty++ : cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;
    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function scrollToCart(){
  document.getElementById("cartBox").scrollIntoView({behavior:"smooth"});
}

/* ORDER */
function sendOrder(){
  let order = "";
  cart.forEach(c => order += `${c.name} x ${c.qty}\n`);

  fetch("https://formspree.io/f/xrevoywb", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

</script>

</body>
</html>
