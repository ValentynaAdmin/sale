<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин</title>

<style>
body {
  font-family: Arial;
  background: #f6f3ee;
  margin: 0;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 15px;
  text-align: center;
}

/* LAYOUT */
.container {
  display: flex;
  align-items: flex-start;
}

/* PRODUCTS */
.products {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* 📸 чуть больше фото */
.product img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  border-radius: 8px;
  cursor: zoom-in;
}

/* buttons */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 5px;
}

.controls button {
  flex: 1;
  background: #2f4f3f;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

/* 🛒 CART (sticky + fixed feel) */
.cart {
  position: sticky;
  top: 10px;

  flex: 1;
  background: #e9f5ea;
  margin: 15px;
  padding: 15px;
  border-radius: 16px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.12);

  max-height: 90vh;
  overflow-y: auto;
}

/* TITLE */
.cart-title {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  margin-bottom: 10px;
}

/* ITEMS */
.cart-item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* INPUTS ORDER */
.cart input,
.cart textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  resize: vertical;
}

/* 🟢 ORDER BUTTON */
.order-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f9d6a, #2f7f55);
  color: white;
  font-weight: 600;
  padding: 13px;
  font-size: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.order-btn:hover {
  transform: scale(1.02);
}

/* MOBILE FIX (центр + отступы) */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }

  .cart {
    position: relative;
    margin: 10px auto;
    width: calc(100% - 20px);
  }
}
</style>
</head>

<body>

<header>
  <h2>Оберіть потрібну пропозицію</h2>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">

    <div class="cart-title">
      <span>🛒 Корзина</span>
      <span id="total">0 грн</span>
    </div>

    <div id="cart"></div>

    <!-- ПОРЯДОК ИСПРАВЛЕН -->
    <input id="name" placeholder="Ім'я">
    <input id="phone" placeholder="Телефон">
    <textarea id="city" placeholder="Адреса"></textarea>
    <textarea id="comment" placeholder="Коментар"></textarea>

    <button class="order-btn" onclick="sendOrder()">
      Оформити замовлення
    </button>

  </div>

</div>

<script>

/* PRODUCTS */
let products = [
  {
    name: "Товар 1 - длинное название товара",
    price: 100,
    description: "Описание товара",
    images: ["img/1.jpg", "img/2.jpg", "img/3.jpg"]
  },
  {
    name: "Товар 2",
    price: 150,
    description: "Описание товара",
    images: ["img/1-1.jpg", "img/1-2.jpg", "img/1-3.jpg"]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let imgIndex = {};

/* RENDER */
renderProducts();
renderCart();

function renderProducts(){
  let html = "";

  products.forEach((p, i) => {

    html += `
      <div class="product">

        <img src="${p.images[0]}" id="img-${i}">

        <div class="controls">
          <button onclick="prevImg(${i})">⬅</button>
          <button onclick="nextImg(${i})">➡</button>
        </div>

        <h4>${p.name}</h4>
        <p>${p.description}</p>
        <b>${p.price} грн</b>

        <!-- ИЗМЕНЕНО -->
        <button onclick="add(${i})">Додати в корзину</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* SLIDER */
function getIndex(i){
  if(imgIndex[i] === undefined) imgIndex[i] = 0;
  return imgIndex[i];
}

function nextImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) + 1) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

function prevImg(i){
  let p = products[i];
  imgIndex[i] = (getIndex(i) - 1 + p.images.length) % p.images.length;
  document.getElementById(`img-${i}`).src = p.images[getIndex(i)];
}

/* CART */
function add(i){
  let item = products[i];
  let found = cart.find(x => x.name === item.name);

  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(c => {
    total += c.price * c.qty;
    html += `<div class="cart-item">${c.name} x ${c.qty}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;

  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ORDER */
function sendOrder(){

  let order = "";

  cart.forEach(c => {
    order += `${c.name} x ${c.qty}\n`;
  });

  fetch("https://formspree.io/f/xrevoywb", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: `
Нове замовлення:

${order}

Ім'я: ${document.getElementById("name").value}
Телефон: ${document.getElementById("phone").value}
Адреса: ${document.getElementById("city").value}
Коментар: ${document.getElementById("comment").value}

Сума: ${document.getElementById("total").innerText}
`
    })
  });

  alert("Замовлення відправлено!");
  cart = [];
  save();
  renderCart();
}

</script>

</body>
</html>
